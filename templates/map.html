<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maharashtra Police Directory</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1e;
      --navy2: #111827;
      --panel: #141c2f;
      --border: #1e2d4a;
      --accent: #f59e0b;
      --accent2: #3b82f6;
      --muted: #64748b;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --red: #ef4444;
      --green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1a33 60%, #0f1f3d 100%);
      border-bottom: 2px solid var(--accent);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .badge {
      width: 52px;
      height: 52px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1.1;
    }

    header h1 span {
      display: block;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .emergency {
      background: var(--red);
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 4px;
      letter-spacing: 1px;
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.75;
      }
    }

    .btn-back-header {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text2);
      border-radius: 8px;
      text-decoration: none;
      font-size: 20px;
      transition: all 0.25s;
      flex-shrink: 0;
    }

    .btn-back-header:hover {
      background: rgba(245, 158, 11, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(-4px);
    }

    .emergency small {
      font-size: 10px;
      display: block;
      text-align: center;
      letter-spacing: 2px;
      opacity: 0.85;
    }

    /* CONTROLS */
    .controls {
      padding: 16px 32px;
      background: var(--navy2);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent2);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.5;
    }

    .filter-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.08);
    }

    .count-badge {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .count-badge span {
      color: var(--accent2);
      font-weight: 500;
    }

    /* GRID */
    .grid {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .card-header {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.12) 0%, transparent 100%);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-header .left h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1.2;
    }

    .card-header .marathi {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 13px;
      color: var(--accent);
      margin-top: 2px;
    }

    .district-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.05);
      padding: 3px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .card-body {
      padding: 14px 16px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .info-row .icon {
      color: var(--accent2);
      font-size: 13px;
      margin-top: 1px;
      flex-shrink: 0;
      width: 16px;
    }

    .info-row .label {
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      min-width: 56px;
    }

    .info-row .val {
      color: var(--text2);
      line-height: 1.4;
    }

    .info-row a.tel {
      color: var(--green);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .info-row a.tel:hover {
      text-decoration: underline;
    }

    .coords {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* STATIONS SECTION */
    .stations-toggle {
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      width: 100%;
      padding: 10px 16px;
      color: var(--text2);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }

    .stations-toggle:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .stations-toggle .arrow {
      transition: transform 0.2s;
      font-size: 10px;
      color: var(--accent);
    }

    .stations-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .stations-list {
      display: none;
      border-top: 1px solid var(--border);
    }

    .stations-list.open {
      display: block;
    }

    .station-item {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(30, 45, 74, 0.5);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
      align-items: center;
    }

    .station-item:last-child {
      border-bottom: none;
    }

    .station-item .s-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .station-item .s-taluka {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .station-item .s-addr {
      font-size: 11px;
      color: var(--muted);
      grid-column: 1;
    }

    .station-item a.s-tel {
      color: var(--green);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-decoration: none;
      text-align: right;
      grid-row: span 2;
      align-self: center;
    }

    .station-item a.s-tel:hover {
      text-decoration: underline;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    footer a {
      color: var(--accent2);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      header {
        padding: 16px;
      }

      .controls,
      .grid {
        padding: 12px 16px;
      }

      header h1 {
        font-size: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        </div>
        <div class="info-row">
          <span class="icon">🚨</span>
          <span class="label">Control</span>
          <span class="val"><a href="tel:112" class="tel">112</a></span>
        </div>
        <div class="info-row">
          <span class="icon">🌐</span>
          <span class="label">Web</span>
          <span class="val"><a href="https://www.mahapolice.gov.in" target="_blank" class="tel">mahapolice.gov.in</a></span>
        </div>
        <div class="info-row">
          <span class="icon">📡</span>
          <span class="label">Coords</span>
          <span class="val coords">${d.latitude}°N, ${d.longitude}°E</span>
        </div>
      </div>
      <button class="stations-toggle" onclick="toggleStations(this)">
        <span>Police Stations (${d.taluka_stations.length})</span>
        <span class="arrow">▼</span>
      </button>
      <div class="stations-list">
        ${stations}
      </div>
    </div>
  `;
    }

    function render() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const grid = document.getElementById('cardsGrid');
      let visible = 0;

      const cards = DIRECTORY.map((d, i) => {
        const regionMatch = currentFilter === 'all' || d.region === currentFilter;
        const searchMatch = !q || d['data-search'] ? true : (d.district_name + ' ' + d.marathi_name + ' ' + d.office_address + ' ' + d.taluka_stations.map(s => s.station_name + ' ' + s.taluka).join(' ')).toLowerCase().includes(q);
        return { d, i, regionMatch, searchMatch };
      });

      grid.innerHTML = '';

      cards.forEach(({ d, i, regionMatch }) => {
        const searchVal = (d.district_name + ' ' + d.marathi_name + ' ' + d.office_address + ' ' + d.taluka_stations.map(s => s.station_name + ' ' + s.taluka + ' ' + s.address).join(' ')).toLowerCase();
        const searchMatch = !q || searchVal.includes(q);
        if (regionMatch && searchMatch) {
          grid.insertAdjacentHTML('beforeend', buildCard(d, visible));
          visible++;
        }
      });

      if (visible === 0) {
        grid.innerHTML = '<div class="no-results">// NO MATCHING RECORDS FOUND</div>';
      }

      document.getElementById('visibleCount').textContent = visible;
    }

    function filterCards() { render(); }

    function setFilter(region, btn) {
      currentFilter = region;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function toggleStations(btn) {
      const list = btn.nextElementSibling;
      btn.classList.toggle('open');
      list.classList.toggle('open');
    }

    render();
  </script>
</body>

</html>
